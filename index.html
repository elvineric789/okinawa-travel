<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸福沖繩之旅</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-cyan-50 flex justify-center items-center min-h-screen m-0 py-4 font-sans text-gray-800">

  <div class="w-full h-screen bg-cyan-50 shadow-2xl flex flex-col relative">
        
  
    <!-- 主滾動區域 -->
    <div class="flex-1 p-5 overflow-y-auto pb-24" id="content-area">
      
      <!-- ========================================================================= -->
      <!--                                [模塊 1] 首頁分頁                            -->
      <!-- ========================================================================= -->
      <div id="view-home" class="block animate-fade-in">
        <div class="bg-white rounded-[24px] shadow-sm mb-6 border border-gray-100 pb-8 flex flex-col relative overflow-hidden">
          <img src="https://jp.zekkeijapan.com/datas/images/2024/04/17/eb6b5e3990b9a0cdf3d5355c0537605c399929cd.jpg" class="w-full h-48 object-cover">
          <div class="absolute top-40 left-0 right-0 h-10 bg-gradient-to-t from-white to-transparent"></div>
          <div class="absolute top-44 left-1/2 -translate-x-1/2 bg-gradient-to-r from-[#ff5a5f] to-[#ff9b6a] text-white px-5 py-1.5 rounded-full text-xs font-bold shadow-md">家之絆</div>
          
          <div class="text-center mt-8 px-4">
            <h1 class="text-2xl font-black text-gray-800 tracking-wider">沖繩幸福之旅</h1>
            <p class="text-xs text-gray-400 font-medium tracking-tight">Okinawa Family Vacation 2026</p>
          </div>

          <div class="mx-4 mt-6 border border-[#faeee0] bg-[#fffcf8] rounded-[20px] p-4 flex flex-col gap-3">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 bg-white rounded-xl shadow-sm border border-[#faeee0] flex items-center justify-center text-[#ff5a5f]">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
              </div>
              <div>
                <div class="text-[9px] font-bold text-gray-400 uppercase">Date</div>
                <div class="text-sm font-bold text-gray-700">2026/4/21 - 4/25</div>
              </div>
            </div>
            
            <div class="h-px bg-[#f0e0cd]"></div>
            
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 bg-white rounded-xl shadow-sm border border-[#e0f2f1] flex items-center justify-center text-[#008b8b]">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg>
              </div>
              <div>
                <div class="text-[9px] font-bold text-gray-400 uppercase">Location</div>
                <div class="text-sm font-bold text-gray-700">日本 ‧ 沖繩</div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 底部導覽 -->
    <div class="flex border-t border-cyan-100 bg-white fixed bottom-0 w-full shadow-[0_-4px_15px_rgba(0,0,0,0.05)] z-20 pb-safe">
      <button onclick="window.location.href='index.html'" id="nav-home" class="nav-btn active flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="text-xs font-medium">首頁</span>
      </button>
      <button onclick="window.location.href='info.html'" id="nav-info" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-xs font-medium">須知</span>
      </button>
      <button onclick="window.location.href='itinerary.html'" id="nav-itinerary" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
        <span class="text-xs font-medium">行程</span>
      </button>
      <button onclick="window.location.href='expense.html'" id="nav-expense" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-xs font-medium">記帳</span>
      </button>
      <button onclick="window.location.href='note.html'" id="nav-note" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        <span class="text-xs font-medium">手札</span>
      </button>
    </div>

  </div>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
    
    /* 導覽列動畫 */
    .nav-btn { color: #9ca3af; transition: all 0.3s ease; }
    .nav-btn.active { color: #0ea5e9; }
    .nav-btn.active svg { animation: jumpBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; stroke-width: 2.5; }
    @keyframes jumpBounce { 0% { transform: translateY(0) scale(1); } 50% { transform: translateY(-4px) scale(1.1); } 100% { transform: translateY(0) scale(1); } }
  </style>

  <script>
    // 獨立出來的 switchTab 切換邏輯
    window.switchTab = (tab) => {
      ['home'].forEach(t => {
        const view = document.getElementById('view-'+t);
        const nav = document.getElementById('nav-'+t);
        if (view) view.classList.add('hidden');
        if (nav) nav.classList.remove('active');
      });
      const activeView = document.getElementById('view-'+tab);
      const activeNav = document.getElementById('nav-'+tab);
      if (activeView) activeView.classList.remove('hidden');
      if (activeNav) activeNav.classList.add('active');
    };
  </script>
</body>
</html>
