<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幸福沖繩之旅 - 旅遊花費</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyAJ6e1bbgtZYC2yGa_N69pud-9y8OAx0aY",
      authDomain: "okinawa-travel-24e59.firebaseapp.com",
      projectId: "okinawa-travel-24e59",
      storageBucket: "okinawa-travel-24e59.firebasestorage.app",
      messagingSenderId: "646446031010",
      appId: "1:646446031010:web:e86ddbc128c3cc64aaf7fb"
    };

    // 系統全域變數
    let db;
    window.currentExpenses = [];
    window.editingExpenseId = null;
    window.deleteTarget = { id: null, type: null };
    // 更新成員名單：爸、媽、姐、荳荳、哥哥、凱琪、耶寶、阿利、叡叡
    window.members = ['爸', '媽', '姐', '荳荳', '哥哥', '凱琪', '耶寶', '阿利', '叡叡'];
    window.exchangeRate = 0.21;
    window.currentTab = 'all'; // all, partial, custom
    window.partialSelected = [...window.members]; 
    window.customCurrency = 'JPY'; 
    window.currentCurrency = 'JPY'; // 追蹤主輸入框當前活躍的幣別

    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      console.log("Firebase 服務啟動完成！");
      fetchRate();
      setTimeout(() => { 
        if (window.loadData) window.loadData('expense');
        renderMemberBubbles();
        renderCustomInputs();
      }, 500);
    } catch (error) {
      console.error("Firebase 初始化失敗：", error);
    }

    // 獲取即時匯率
    async function fetchRate() {
      try {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/JPY');
        const data = await res.json();
        if(data && data.rates && data.rates.TWD) {
          window.exchangeRate = data.rates.TWD;
          document.getElementById('exchange-rate-display').innerText = `目前匯率參考：1 日幣 = ${window.exchangeRate.toFixed(4)} 台幣`;
          if (window.currentExpenses.length > 0) window.renderTotals();
        }
      } catch(e) { 
        console.log("無法獲取即時匯率，使用預設值 0.21"); 
      }
    }

    // 雙幣別輸入自動換算
    window.handleMainAmountChange = function(type) {
      window.currentCurrency = type; // 記錄使用者當前輸入的是哪一種幣別
      const jpyInput = document.getElementById('expense-amount-jpy');
      const twdInput = document.getElementById('expense-amount-twd');
      
      if (type === 'JPY') {
        if (jpyInput.value === '') {
           twdInput.value = '';
        } else {
           twdInput.value = Math.round(Number(jpyInput.value) * window.exchangeRate);
        }
      } else if (type === 'TWD') {
        if (twdInput.value === '') {
           jpyInput.value = '';
        } else {
           jpyInput.value = Math.round(Number(twdInput.value) / window.exchangeRate);
        }
      }
    };

    // 自動計算自訂花費總額
    window.updateTotalFromCustom = function() {
      if (window.currentTab !== 'custom') return;
      
      let total = 0;
      for (let i = 0; i < window.members.length; i++) {
        total += Number(document.getElementById(`custom-amt-${i}`).value) || 0;
      }
      
      const jpyInput = document.getElementById('expense-amount-jpy');
      const twdInput = document.getElementById('expense-amount-twd');

      if (window.customCurrency === 'JPY') {
        jpyInput.value = total > 0 ? total : '';
        window.handleMainAmountChange('JPY');
      } else {
        twdInput.value = total > 0 ? total : '';
        window.handleMainAmountChange('TWD');
      }
    };

    // 切換分攤方式頁籤
    window.switchTab = function(tab) {
      window.currentTab = tab;
      const tabs = ['all', 'partial', 'custom'];
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-btn-${t}`);
        if(t === tab) {
          btn.className = "px-4 py-1.5 rounded-lg text-xs font-bold bg-white shadow-sm text-sky-600 transition-all";
        } else {
          btn.className = "px-4 py-1.5 rounded-lg text-xs font-bold text-gray-400 hover:bg-gray-100 transition-all";
        }
      });

      document.getElementById('section-partial').classList.toggle('hidden', tab !== 'partial');
      document.getElementById('section-custom').classList.toggle('hidden', tab !== 'custom');

      // 處理欄位鎖定狀態
      const jpyInput = document.getElementById('expense-amount-jpy');
      const twdInput = document.getElementById('expense-amount-twd');
      const autoSplitBtn = document.getElementById('auto-split-btn');

      if (tab === 'custom') {
        jpyInput.readOnly = true;
        twdInput.readOnly = true;
        jpyInput.classList.add('bg-gray-100', 'cursor-not-allowed', 'opacity-70');
        twdInput.classList.add('bg-gray-100', 'cursor-not-allowed', 'opacity-70');
        jpyInput.classList.remove('bg-gray-50');
        twdInput.classList.remove('bg-gray-50');
        if(autoSplitBtn) autoSplitBtn.classList.add('hidden');
        window.updateTotalFromCustom();
      } else {
        jpyInput.readOnly = false;
        twdInput.readOnly = false;
        jpyInput.classList.remove('bg-gray-100', 'cursor-not-allowed', 'opacity-70');
        twdInput.classList.remove('bg-gray-100', 'cursor-not-allowed', 'opacity-70');
        jpyInput.classList.add('bg-gray-50');
        twdInput.classList.add('bg-gray-50');
        if(autoSplitBtn) autoSplitBtn.classList.remove('hidden');
      }
    };

    // 渲染「部分平攤」的成員氣泡
    window.renderMemberBubbles = function() {
      const container = document.getElementById('partial-members-grid');
      container.innerHTML = window.members.map(m => `
        <button onclick="togglePartialMember('${m}')" class="px-4 py-1.5 rounded-full text-xs font-bold border transition-all shadow-sm ${window.partialSelected.includes(m) ? 'bg-sky-500 border-sky-500 text-white' : 'bg-white border-gray-200 text-gray-400'}">
          ${m}
        </button>
      `).join('');
    };

    window.togglePartialMember = function(member) {
      if(window.partialSelected.includes(member)) {
        window.partialSelected = window.partialSelected.filter(m => m !== member);
      } else {
        window.partialSelected.push(member);
      }
      renderMemberBubbles();
    };

    // 渲染「自訂花費」的輸入網格
    window.renderCustomInputs = function() {
      const container = document.getElementById('custom-inputs-grid');
      container.innerHTML = window.members.map((m, i) => `
        <div class="flex flex-col gap-1">
          <label class="text-[11px] text-gray-500 ml-1 font-bold">${m}</label>
          <div class="relative">
            <span class="absolute left-2.5 top-2.5 text-gray-300 text-xs font-bold custom-curr-symbol">${window.customCurrency === 'JPY' ? '¥' : 'NT$'}</span>
            <input type="number" id="custom-amt-${i}" oninput="updateTotalFromCustom()" placeholder="" class="w-full p-2 pl-8 text-sm border border-gray-200 rounded-xl bg-gray-50 focus:bg-white focus:border-sky-300 outline-none transition-all font-bold text-sky-700">
          </div>
        </div>
      `).join('');
    };

    // 自訂花費內的幣別切換
    window.switchCustomCurrency = function(curr) {
      window.customCurrency = curr;
      document.getElementById('cust-btn-jpy').className = curr === 'JPY' ? 'px-2 py-1 bg-white text-sky-600 rounded shadow-sm' : 'px-2 py-1 text-gray-400 hover:bg-gray-200 rounded';
      document.getElementById('cust-btn-twd').className = curr === 'TWD' ? 'px-2 py-1 bg-white text-emerald-600 rounded shadow-sm' : 'px-2 py-1 text-gray-400 hover:bg-gray-200 rounded';
      document.querySelectorAll('.custom-curr-symbol').forEach(el => el.innerText = curr === 'JPY' ? '¥' : '$');
      window.updateTotalFromCustom();
    };

    // 展開/收合明細
    window.toggleDetails = function(id) {
      const el = document.getElementById(`details-${id}`);
      if (el.classList.contains('hidden')) {
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    };

    // ----- 記帳表單操作 -----
    window.toggleExpenseForm = function() {
      const form = document.getElementById('expense-form-card');
      form.classList.toggle('hidden');
      if(!form.classList.contains('hidden')) {
        document.getElementById('expense-date').value = '2026-04-21';
        document.getElementById('expense-category').value = '飲食';
        document.getElementById('expense-item').value = '';
        document.getElementById('expense-amount-jpy').value = '';
        document.getElementById('expense-amount-twd').value = '';
        
        window.currentCurrency = 'JPY';
        window.switchTab('all');
        window.partialSelected = [...window.members];
        renderMemberBubbles();
        window.switchCustomCurrency('JPY');
        window.members.forEach((m, i) => document.getElementById(`custom-amt-${i}`).value = '');
        
        document.getElementById('save-expense-btn').innerText = "＋ 確認新增";
        window.editingExpenseId = null;
        document.getElementById('view-expense').scrollIntoView({ behavior: 'smooth' });
      }
    };

    window.editExpense = function(id) {
      const exp = window.currentExpenses.find(e => e.id === id);
      if (!exp) return;
      window.editingExpenseId = id;
      
      document.getElementById('expense-date').value = exp.date || '2026-04-21';
      document.getElementById('expense-category').value = exp.category || '飲食';
      document.getElementById('expense-item').value = exp.item || '';
      document.getElementById('expense-amount-jpy').value = exp.amountJPY || '';
      document.getElementById('expense-amount-twd').value = exp.amountTWD || exp.amount || '';
      
      // 處理分攤模式與幣別
      window.currentCurrency = exp.currency || 'JPY';
      let mode = exp.mode || 'all';
      if (!exp.mode && exp.splits) {
         if (exp.splits.length < window.members.length) mode = 'partial';
      }
      window.switchTab(mode);

      // 還原部分平攤或自訂花費資料
      if (mode === 'partial') {
        window.partialSelected = exp.splits ? exp.splits.map(s => s.member) : [...window.members];
        renderMemberBubbles();
      } else if (mode === 'custom') {
        const custCurr = exp.currency || 'JPY';
        window.switchCustomCurrency(custCurr);
        window.members.forEach((m, i) => {
          const s = exp.splits?.find(sp => sp.member === m);
          document.getElementById(`custom-amt-${i}`).value = s ? s.amount : '';
        });
      }

      document.getElementById('expense-form-card').classList.remove('hidden');
      document.getElementById('save-expense-btn').innerText = "更新消費";
      document.getElementById('view-expense').scrollIntoView({ behavior: 'smooth' });
    };

    window.requestDelete = function(id) {
      window.deleteTarget = { id };
      document.getElementById('delete-confirm-modal').classList.remove('hidden');
      document.getElementById('delete-confirm-modal').classList.add('flex');
    };

    window.closeDeleteModal = function() {
      window.deleteTarget = { id: null };
      document.getElementById('delete-confirm-modal').classList.add('hidden');
      document.getElementById('delete-confirm-modal').classList.remove('flex');
    };

    window.confirmDeleteAction = async function() {
      const { id } = window.deleteTarget;
      if (!id) return;
      window.closeDeleteModal();
      try {
        await deleteDoc(doc(db, "expenses", id));
        window.loadData('expense');
      } catch(e) { console.error("刪除失敗", e); }
    };

    window.saveData = async function() {
      const btn = document.getElementById('save-expense-btn');
      const originalText = btn.innerText;
      btn.innerText = "處理中...";
      btn.disabled = true;

      try {
        const item = document.getElementById('expense-item').value;
        const amtJPY = Number(document.getElementById('expense-amount-jpy').value) || 0;
        const amtTWD = Number(document.getElementById('expense-amount-twd').value) || 0;
        
        if(!item || (amtJPY === 0 && amtTWD === 0)) throw new Error("請完整填寫項目名稱與至少一種幣別金額");

        // 決定主要幣別以計算分攤 (依據目前選擇的輸入模式)
        let mainCurrency = window.currentCurrency;
        if (window.currentTab === 'custom') {
            mainCurrency = window.customCurrency;
        }

        const totalAmount = mainCurrency === 'JPY' ? amtJPY : amtTWD;

        let splits = [];
        if(window.currentTab === 'all') {
          const perAmt = totalAmount / window.members.length;
          splits = window.members.map(m => ({ member: m, amount: Math.round(perAmt * 100) / 100 }));
        } else if(window.currentTab === 'partial') {
          if (window.partialSelected.length === 0) throw new Error("請至少選擇一位分攤成員");
          const perAmt = totalAmount / window.partialSelected.length;
          splits = window.partialSelected.map(m => ({ member: m, amount: Math.round(perAmt * 100) / 100 }));
        } else {
          window.members.forEach((m, i) => {
            const val = Number(document.getElementById(`custom-amt-${i}`).value);
            if(val > 0) splits.push({ member: m, amount: val });
          });
          if (splits.length === 0) throw new Error("自訂花費模式下，請至少為一位成員輸入金額");
        }

        const payload = { 
          date: document.getElementById('expense-date').value, 
          category: document.getElementById('expense-category').value,
          item: item, 
          amountJPY: amtJPY,
          amountTWD: amtTWD, 
          currency: mainCurrency,
          mode: window.currentTab,
          splits: splits,
          timestamp: new Date() 
        };

        if (window.editingExpenseId) {
          await updateDoc(doc(db, "expenses", window.editingExpenseId), payload);
        } else {
          await addDoc(collection(db, "expenses"), payload);
        }
        
        // 儲存後自動隱藏表單並重整
        document.getElementById('expense-form-card').classList.add('hidden');
        await window.loadData();
      } catch (e) {
        alert(e.message || "處理過程發生錯誤");
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    };

    window.renderTotals = function() {
      let totalJPY = 0;
      let totalTWD = 0;
      window.currentExpenses.forEach(data => {
        let c = data.currency || 'JPY';
        // 修正加總邏輯：只依照該筆紀錄的「主要幣別」累加原始金額，避免雙重計算
        if (c === 'JPY') {
          totalJPY += (Number(data.amountJPY) || Number(data.amount) || 0);
        } else {
          totalTWD += (Number(data.amountTWD) || Number(data.amount) || 0);
        }
      });

      // 總和互相換算
      const combinedJPY = totalJPY + (totalTWD / window.exchangeRate);
      const combinedTWD = totalTWD + (totalJPY * window.exchangeRate);

      document.getElementById('total-jpy').innerText = Math.round(combinedJPY).toLocaleString();
      document.getElementById('total-twd').innerText = Math.round(combinedTWD).toLocaleString();
    };

    // 渲染成員個別總花費
    window.renderMemberTotals = function() {
      let totals = {};
      window.members.forEach(m => totals[m] = { jpy: 0, twd: 0 });

      window.currentExpenses.forEach(exp => {
        let c = exp.currency || 'JPY';
        if (exp.splits) {
          exp.splits.forEach(s => {
            if (!totals[s.member]) totals[s.member] = { jpy: 0, twd: 0 };
            if (c === 'JPY') {
              totals[s.member].jpy += (Number(s.amount) || 0);
            } else {
              totals[s.member].twd += (Number(s.amount) || 0);
            }
          });
        }
      });

      const container = document.getElementById('member-totals-section');
      if (!container) return;
      
      let html = `
        <div class="flex items-center gap-2 mb-3 mt-2">
          <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
          <h2 class="text-lg font-bold text-cyan-800">成員個別總花費</h2>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-sky-100 overflow-hidden mb-6">
      `;

      Object.keys(totals).forEach(m => {
        const jpy = totals[m].jpy;
        const twd = totals[m].twd;
        if (jpy === 0 && twd === 0 && !window.members.includes(m)) return; // 略過已無花費的舊成員
        
        const combinedTWD = Math.round(twd + (jpy * window.exchangeRate));
        
        html += `
          <div class="flex justify-between items-center p-4 border-b border-gray-50 last:border-0 hover:bg-sky-50/50 transition-colors">
            <div class="font-bold text-gray-700 text-base">${m}</div>
            <div class="font-black text-emerald-500 text-lg">NT$ ${combinedTWD.toLocaleString()}</div>
          </div>
        `;
      });
      html += `</div>`;
      container.innerHTML = html;
    };

    window.loadData = async function() {
      if (!db) return;
      const listContainer = document.getElementById('expense-list');
      listContainer.innerHTML = '<div class="text-center text-cyan-600 py-4 animate-pulse">更新數據中...</div>';
      try {
        const q = query(collection(db, 'expenses'));
        const querySnapshot = await getDocs(q);
        const docsArray = [];
        querySnapshot.forEach(doc => docsArray.push({ id: doc.id, ...doc.data() }));
        
        // 依照消費日期先後排列 (日期較新的在上)，若日期相同則依建立時間排序
        docsArray.sort((a, b) => {
          const dateA = a.date || "";
          const dateB = b.date || "";
          if (dateA !== dateB) {
            return dateB.localeCompare(dateA); // 日期降冪排序
          }
          return (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0); // 同日期依建立時間降冪
        });
        
        window.currentExpenses = docsArray;
        window.renderTotals();
        window.renderMemberTotals();
        listContainer.innerHTML = docsArray.length ? '' : '<div class="text-center text-gray-400 py-4">尚無任何紀錄</div>';

        docsArray.forEach((data) => {
          let c = data.currency || 'JPY';
          let amtJPY = Number(data.amountJPY) || 0;
          let amtTWD = Number(data.amountTWD) || 0;
          
          // 兼容舊格式
          if (!data.amountJPY && !data.amountTWD && data.amount) {
              if (c === 'JPY') {
                  amtJPY = Number(data.amount);
                  amtTWD = Math.round(amtJPY * window.exchangeRate);
              } else {
                  amtTWD = Number(data.amount);
                  amtJPY = Math.round(amtTWD / window.exchangeRate);
              }
          }
          if (amtJPY > 0 && amtTWD === 0) amtTWD = Math.round(amtJPY * window.exchangeRate);
          if (amtTWD > 0 && amtJPY === 0) amtJPY = Math.round(amtTWD / window.exchangeRate);
          
          // 判斷分攤模式與均攤文字
          let mode = data.mode || 'all';
          if (!data.mode && data.splits && data.splits.length < window.members.length) mode = 'partial';
          if (!data.mode && data.splits && data.splits.length === window.members.length && new Set(data.splits.map(s => s.amount)).size > 1) mode = 'custom';

          let modeText = '全員平攤';
          if (mode === 'partial') modeText = '部分平攤';
          if (mode === 'custom') modeText = '自訂花費';

          let perPersonText = '';
          if (mode === 'all' || mode === 'partial') {
             const count = (data.splits && data.splits.length > 0) ? data.splits.length : window.members.length;
             const perAmt = (c === 'JPY' ? amtJPY : amtTWD) / count;
             perPersonText = `每人 ${c === 'JPY'?'¥':'NT$'}${Math.round(perAmt * 100) / 100}`;
          } else {
             perPersonText = '依照自訂金額';
          }

          // 展開明細區域的 HTML (全員平攤不顯示)
          let detailHtml = '';
          let expandBtn = '';
          if (mode !== 'all' && data.splits && data.splits.length > 0) {
              expandBtn = `<button onclick="toggleDetails('${data.id}')" class="mt-1.5 text-[11px] font-bold text-sky-500 bg-sky-50 px-2.5 py-1 rounded-full hover:bg-sky-100 transition-colors border border-sky-100">查看明細 ▼</button>`;
              
              const detailItems = data.splits.map(s => `
                <div class="flex justify-between items-center py-1.5 border-b border-gray-100 last:border-0">
                  <span class="text-[12px] text-gray-600 font-bold">${s.member}</span>
                  <span class="text-[12px] font-black ${c==='JPY'?'text-sky-600':'text-emerald-500'}">${c==='JPY'?'¥':'NT$'}${Number(s.amount).toLocaleString()}</span>
                </div>
              `).join('');

              detailHtml = `
                <div id="details-${data.id}" class="hidden mt-3 p-3 bg-gray-50/80 border border-gray-100 rounded-xl">
                  ${detailItems}
                </div>
              `;
          }

          // 雙幣別左右顯示
          const amountDisplayHTML = `
            <div class="flex items-center justify-end gap-1.5 flex-wrap bg-gray-50 px-2 py-1.5 rounded-lg border border-gray-100">
              <span class="text-sky-600 font-black text-sm">¥${amtJPY.toLocaleString()}</span>
              <span class="text-gray-300 text-[10px]">|</span>
              <span class="text-emerald-500 font-bold text-sm">NT$${amtTWD.toLocaleString()}</span>
            </div>
          `;

          const div = document.createElement('div');
          div.className = 'bg-white rounded-xl shadow-sm mb-4 border-l-4 border-sky-500 p-4 transform transition duration-300 hover:scale-[1.01]';
          div.innerHTML = `
            <div class="flex justify-between items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1.5">
                  <div class="text-[10px] font-bold text-sky-500">${data.date || ''}</div>
                  <div class="bg-sky-50 text-sky-600 px-1.5 py-0.5 rounded text-[9px] font-bold">${data.category || ''}</div>
                </div>
                <h4 class="font-bold text-gray-800 text-base leading-tight break-words mb-1.5">${data.item}</h4>
                <div class="flex flex-wrap items-center gap-2">
                  <span class="bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded text-[10px] font-bold">${modeText}</span>
                  <span class="text-[11px] text-gray-400 font-bold">${perPersonText}</span>
                </div>
                ${expandBtn}
              </div>
              <div class="flex flex-col items-end gap-1.5 shrink-0">
                ${amountDisplayHTML}
                <div class="flex gap-2 mt-1.5">
                  <button onclick="editExpense('${data.id}')" class="bg-sky-50 text-sky-500 hover:bg-sky-100 hover:text-sky-600 rounded-lg p-2 transition-colors shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                  </button>
                  <button onclick="requestDelete('${data.id}')" class="bg-red-50 text-red-500 hover:bg-red-100 hover:text-red-600 rounded-lg p-2 transition-colors shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>
              </div>
            </div>
            ${detailHtml}
          `;
          listContainer.appendChild(div);
        });
      } catch (e) { 
        console.error("資料加載失敗：", e); 
        listContainer.innerHTML = '<div class="text-center text-red-500 py-4">讀取失敗，請確認網路連線</div>';
      }
    };
  </script>
</head>
<body class="bg-cyan-50 flex justify-center items-center min-h-screen m-0 py-4 font-sans text-gray-800">

  <div class="w-full h-screen bg-cyan-50 shadow-2xl flex flex-col relative max-w-lg mx-auto overflow-hidden">
        
    <!-- 主滾動區域 -->
    <div class="flex-1 p-5 overflow-y-auto pb-24" id="content-area">
      
      <div id="view-expense" class="block animate-fade-in pb-4">
        
        <!-- 標題與新增消費按鈕 -->
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-bold text-cyan-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            旅遊花費
          </h2>
          <!-- 調整此按鈕樣式比照新增手札 -->
          <button onclick="toggleExpenseForm()" class="flex items-center gap-1 bg-sky-100 text-sky-600 px-3 py-1.5 rounded-full text-sm font-bold shadow-sm hover:bg-sky-200 active:scale-95 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> 新增消費
          </button>
        </div>

        <!-- 總花費看板 (底色變淺並配上對應雙色文字) -->
        <div class="bg-white rounded-xl p-5 shadow-sm border border-sky-100 mb-6 relative overflow-hidden pb-8 text-center">
          <svg class="absolute right-0 top-0 w-24 h-24 text-sky-500 opacity-5 transform translate-x-4 -translate-y-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.25 1.64-1.74 0-2.1-.96-2.17-1.92H8c.07 1.81 1.25 2.97 2.9 3.32V19h2.33v-1.66c1.67-.31 2.87-1.3 2.87-3.04 0-2.11-1.72-2.77-3.79-3.16z"></path></svg>
          <div class="text-sm font-bold text-sky-800 mb-3 relative z-10">總花費</div>
          <div class="flex flex-col items-center justify-center relative z-10">
            <span class="text-3xl font-black text-sky-600 mb-1">¥ <span id="total-jpy">0</span></span>
            <div class="w-1/2 h-px bg-sky-100 my-2"></div>
            <span class="text-3xl font-black text-emerald-500 mt-1">NT$ <span id="total-twd">0</span></span>
          </div>
          <div id="exchange-rate-display" class="absolute bottom-2 right-3 text-[10px] text-gray-400 opacity-80 z-10 font-medium">連線即時匯率中...</div>
        </div>

        <!-- 新增消費表單 -->
        <div id="expense-form-card" class="hidden bg-white p-6 rounded-2xl shadow-xl mb-6 border border-sky-100 animate-fade-in relative">
          
          <h3 class="text-sky-700 font-black mb-5 text-lg flex items-center gap-2">
            <span class="text-xl">＋</span> 記錄新花費
          </h3>

          <!-- 上半部輸入網格 (日期、分類、日幣、台幣) -->
          <div class="flex gap-3 mb-5">
            <div class="flex-1 min-w-0">
              <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">日期</label>
              <select id="expense-date" class="w-full p-3 border border-sky-100 bg-white rounded-xl text-sm text-gray-700 font-bold outline-none focus:ring-2 focus:ring-sky-300 transition-all truncate">
                <option value="2026-04-21">2026/04/21 (二) - 第一天</option>
                <option value="2026-04-22">2026/04/22 (三) - 第二天</option>
                <option value="2026-04-23">2026/04/23 (四) - 第三天</option>
                <option value="2026-04-24">2026/04/24 (五) - 第四天</option>
                <option value="2026-04-25">2026/04/25 (六) - 第五天</option>
              </select>
            </div>
            <div class="w-[110px] shrink-0">
              <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">分類</label>
              <select id="expense-category" class="w-full p-3 border border-sky-100 bg-white rounded-xl text-sm text-gray-700 font-bold outline-none focus:ring-2 focus:ring-sky-300 transition-all">
                <option value="飲食">🍜 飲食</option>
                <option value="交通">🚕 交通</option>
                <option value="購物">🛍️ 購物</option>
                <option value="住宿">🏨 住宿</option>
                <option value="娛樂">🎟️ 娛樂</option>
                <option value="其他">📦 其他</option>
              </select>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">日幣 (¥)</label>
              <input type="number" id="expense-amount-jpy" oninput="handleMainAmountChange('JPY')" placeholder="輸入日幣" class="w-full p-3 border border-sky-100 bg-gray-50 focus:bg-white rounded-xl font-black text-sky-600 outline-none focus:ring-2 focus:ring-sky-300 transition-all">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">台幣 (NT$)</label>
              <input type="number" id="expense-amount-twd" oninput="handleMainAmountChange('TWD')" placeholder="或輸入台幣" class="w-full p-3 border border-emerald-100 bg-gray-50 focus:bg-white rounded-xl font-black text-emerald-600 outline-none focus:ring-2 focus:ring-emerald-300 transition-all">
            </div>
          </div>

          <!-- 分攤方式標籤選擇區 -->
          <div class="mb-6">
            <div class="flex justify-between items-center mb-4">
              <label class="text-xs font-bold text-gray-500 ml-1">分攤方式</label>
              <div class="flex gap-1 bg-gray-100 p-1 rounded-xl">
                <button id="tab-btn-all" onclick="switchTab('all')" class="px-4 py-1.5 rounded-lg text-xs font-bold bg-white shadow-sm text-sky-600 transition-all">全員平攤</button>
                <button id="tab-btn-partial" onclick="switchTab('partial')" class="px-4 py-1.5 rounded-lg text-xs font-bold text-gray-400 hover:bg-gray-200 transition-all">部分平攤</button>
                <button id="tab-btn-custom" onclick="switchTab('custom')" class="px-4 py-1.5 rounded-lg text-xs font-bold text-gray-400 hover:bg-gray-200 transition-all">自訂花費</button>
              </div>
            </div>

            <!-- 部分平攤內容 (成員氣泡) -->
            <div id="section-partial" class="hidden bg-sky-50/50 p-4 rounded-xl border border-dashed border-sky-200 animate-fade-in">
              <div class="flex flex-wrap gap-2 justify-center" id="partial-members-grid">
                <!-- JS 載入 -->
              </div>
            </div>

            <!-- 自訂花費內容 (各別輸入框) -->
            <div id="section-custom" class="hidden bg-sky-50/50 p-4 rounded-xl border border-sky-100 animate-fade-in">
              <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-gray-500">各別花費輸入</span>
                <div class="flex bg-gray-200 p-0.5 rounded-md gap-0.5">
                  <button onclick="switchCustomCurrency('JPY')" id="cust-btn-jpy" class="px-2 py-1 bg-white text-sky-600 text-[10px] font-bold shadow-sm rounded">日幣(¥)</button>
                  <button onclick="switchCustomCurrency('TWD')" id="cust-btn-twd" class="px-2 py-1 text-gray-500 text-[10px] font-bold rounded hover:bg-white/50">台幣(NT$)</button>
                </div>
              </div>
              <div class="grid grid-cols-3 gap-3" id="custom-inputs-grid">
                <!-- JS 載入 -->
              </div>
            </div>
          </div>

          <!-- 項目名稱 -->
          <div class="mb-6">
            <label class="block text-xs font-bold text-gray-500 mb-1.5 ml-1">項目名稱</label>
            <input type="text" id="expense-item" placeholder="例如：暖暮拉麵、停車費..." class="w-full p-4 border border-sky-100 bg-white rounded-xl font-bold text-gray-800 outline-none focus:ring-2 focus:ring-sky-300 transition-all">
          </div>

          <!-- 送出按鈕 -->
          <button id="save-expense-btn" onclick="saveData()" class="w-full bg-gradient-to-r from-gray-500 to-gray-600 text-white font-bold py-4 rounded-xl shadow-md hover:from-gray-600 hover:to-gray-700 active:scale-[0.98] transition-all text-base tracking-widest">
            ＋ 確認新增
          </button>
        </div>

        <!-- 記帳歷史列表清單 -->
        <div id="expense-list"></div>

        <!-- 成員個別總花費區塊 -->
        <div id="member-totals-section" class="animate-fade-in pb-4"></div>
      </div>

    </div>

    <!-- 底部導覽 -->
    <div class="flex border-t border-cyan-100 bg-white fixed bottom-0 w-full max-w-lg shadow-[0_-4px_15px_rgba(0,0,0,0.05)] z-20 pb-safe">
      <button onclick="window.location.href='index.html'" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        <span class="text-xs font-medium">首頁</span>
      </button>
      <button onclick="window.location.href='info.html'" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-xs font-medium">須知</span>
      </button>
      <button onclick="window.location.href='itinerary.html'" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
        <span class="text-xs font-medium">行程</span>
      </button>
      <button onclick="window.location.href='expense.html'" class="nav-btn active flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span class="text-xs font-medium">記帳</span>
      </button>
      <button onclick="window.location.href='note.html'" class="nav-btn flex-1 py-2.5 flex flex-col items-center gap-0.5 group">
        <svg class="nav-icon w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        <span class="text-xs font-medium">手札</span>
      </button>
    </div>

    <!-- 自訂刪除確認對話框 -->
    <div id="delete-confirm-modal" class="hidden absolute inset-0 z-[100] bg-black/40 backdrop-blur-sm justify-center items-center p-4">
      <div class="bg-white rounded-[20px] p-6 w-full max-w-[300px] shadow-2xl text-center transform animate-fade-in">
        <div class="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-sky-500">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </div>
        <h3 class="text-xl font-bold text-gray-800 mb-2">確定要刪除嗎？</h3>
        <p class="text-sm text-gray-500 mb-6">此動作將無法復原。</p>
        <div class="flex gap-3">
          <button onclick="closeDeleteModal()" class="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200">取消</button>
          <button onclick="confirmDeleteAction()" class="flex-1 py-3 bg-sky-500 text-white font-bold rounded-xl shadow-md hover:bg-sky-600">確定刪除</button>
        </div>
      </div>
    </div>

  </div>

  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
    
    .nav-btn { color: #9ca3af; transition: all 0.3s ease; }
    .nav-btn.active { color: #0ea5e9; }
    .nav-btn.active svg { animation: jumpBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; stroke-width: 2.5; }
    @keyframes jumpBounce { 0% { transform: translateY(0) scale(1); } 50% { transform: translateY(-4px) scale(1.1); } 100% { transform: translateY(0) scale(1); } }
    
    /* 移除數字輸入框上下箭頭 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>

</body>
</html>
